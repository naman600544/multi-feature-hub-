<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator | Multi Feature Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #090d16; color: #f9fafb; font-family: sans-serif; }
        .hub-card { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-md mx-auto hub-card rounded-2xl p-6 mt-10">
        <a href="index.html" class="text-blue-500 mb-4 block"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        <h3 class="text-xl font-bold mb-4 text-blue-400">Age Calculator</h3>
        
        <input type="date" id="birthDate" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white mb-4">
        <button onclick="calculateAge()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition">Calculate Age</button>
        
        <div id="ageResult" class="text-center font-bold p-4 rounded-xl bg-slate-900 mt-4 border border-slate-800 hidden space-y-3">
            <p id="resultText" class="text-lg"></p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyResult()" class="bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm transition"><i class="fa-solid fa-copy"></i> Copy</button>
                <button onclick="shareResult()" class="bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm transition"><i class="fa-solid fa-share-nodes"></i> Share</button>
            </div>
        </div>
    </div>

    <script>
        function calculateAge() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            const today = new Date();
            if(!birthDate.getTime()) return alert("Please select a valid date.");
            
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) { months--; days += 30; }
            if (months < 0) { years--; months += 12; }
            
            const resultText = document.getElementById('resultText');
            resultText.innerText = `You are ${years} years, ${months} months, and ${days} days old.`;
            document.getElementById('ageResult').classList.remove('hidden');
        }

        function copyResult() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Result copied to clipboard!");
        }

        function shareResult() {
            const text = document.getElementById('resultText').innerText;
            if (navigator.share) {
                navigator.share({ title: 'Age Result', text: text });
            } else {
                alert("Sharing is not supported in this browser.");
            }
        }
    </script>
</body>
</html>
