<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #090d16; color: #f9fafb; font-family: sans-serif; }
        .hub-card { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto hub-card rounded-2xl p-6 mt-10">
        <a href="index.html" class="text-blue-500 mb-4 block underline">Back to Home</a>
        <h1 class="text-2xl font-bold mb-6 text-blue-400">QR Code Generator</h1>

        <div class="flex border-b border-slate-700 mb-6">
            <button onclick="setMode('text')" id="tabText" class="flex-1 py-2 font-bold text-blue-400 border-b-2 border-blue-400">Text</button>
            <button onclick="setMode('link')" id="tabLink" class="flex-1 py-2 font-bold text-gray-500">Link</button>
        </div>

        <div class="space-y-4">
            <textarea id="qrInput" placeholder="Enter text to generate QR..." class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white h-24 focus:ring-2 focus:ring-blue-500"></textarea>
            <button onclick="generateQR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition">Generate QR Code</button>
        </div>

        <div id="result" role="region" aria-live="polite" class="mt-6 flex flex-col items-center hidden">
            <img id="qrImage" src="" alt="Generated QR Code" class="bg-white p-2 rounded-lg w-48 h-48 mb-4">
            <div class="flex space-x-3 w-full">
                <a id="downloadBtn" href="#" download="qrcode.png" class="flex-1 bg-green-600 text-center py-2 rounded-lg font-bold">Download</a>
                <button onclick="shareQR()" class="flex-1 bg-purple-600 py-2 rounded-lg font-bold">Share</button>
            </div>
        </div>
    </div>

    <script>
        function setMode(mode) {
            const inputField = document.getElementById('qrInput');
            const tabText = document.getElementById('tabText');
            const tabLink = document.getElementById('tabLink');

            if (mode === 'text') {
                inputField.placeholder = "Enter text to generate QR...";
                tabText.className = "flex-1 py-2 font-bold text-blue-400 border-b-2 border-blue-400";
                tabLink.className = "flex-1 py-2 font-bold text-gray-500";
            } else {
                inputField.placeholder = "Enter URL (e.g. https://google.com)...";
                tabLink.className = "flex-1 py-2 font-bold text-blue-400 border-b-2 border-blue-400";
                tabText.className = "flex-1 py-2 font-bold text-gray-500";
            }
        }

        async function generateQR() {
            const val = document.getElementById('qrInput').value;
            if (!val) return alert("Please enter content to generate QR code!");
            
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(val)}`;
            document.getElementById('qrImage').src = qrUrl;
            document.getElementById('downloadBtn').href = qrUrl;
            document.getElementById('result').classList.remove('hidden');
        }

        function shareQR() {
            // नोट: मोबाइल पर ब्राउज़र इमेज को सीधे शेयर करने की अनुमति मांग सकते हैं
            alert("To share, please download the image first or use the browser's share menu.");
        }
    </script>
</body>
</html>
