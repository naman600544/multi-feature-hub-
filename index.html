<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Feature Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (वही पुराने CSS) */
        body { background-color: #090d16; color: #f9fafb; }
        .hub-card { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="min-h-screen">
    <header class="p-6 text-center">
        <h1 class="text-3xl font-black text-blue-500">Multi Feature Hub</h1>
    </header>

    <main class="max-w-5xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="hub-card rounded-2xl p-6">
            <h3 class="text-xl font-bold mb-2">Age Calculator</h3>
            <p class="text-sm text-gray-400 mb-4">Calculate exact age.</p>
            <a href="age.html" class="block w-full bg-blue-600 text-center py-3 rounded-xl font-bold">Open Tool</a>
        </div>

        <div class="hub-card rounded-2xl p-6">
            <h3 class="text-xl font-bold mb-2">BMI Calculator</h3>
            <p class="text-sm text-gray-400 mb-4">Check health status.</p>
            <a href="bmi.html" class="block w-full bg-blue-600 text-center py-3 rounded-xl font-bold">Open Tool</a>
        </div>

        <div class="hub-card rounded-2xl p-6">
            <h3 class="text-xl font-bold mb-2">Password Gen</h3>
            <p class="text-sm text-gray-400 mb-4">Create secure passwords.</p>
            <a href="password.html" class="block w-full bg-blue-600 text-center py-3 rounded-xl font-bold">Open Tool</a>
        </div>

    </main>
</body>
</html>
