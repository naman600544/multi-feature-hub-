<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Feature Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #090d16; color: #f9fafb; font-family: sans-serif; }
        .hub-card { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto mt-10">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400">Multi Feature Hub</h1>
        
        <div class="space-y-4">
            <div class="hub-card p-4 rounded-xl">
                <h3 class="font-bold text-lg">Age Calculator</h3>
                <p class="text-sm text-gray-400 mb-3">Calculate your exact age in years, months, and days.</p>
                <a href="age-calculator.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-center py-2 rounded-lg font-bold transition">Open Tool</a>
            </div>

            <div class="hub-card p-4 rounded-xl">
                <h3 class="font-bold text-lg">BMI Calculator</h3>
                <p class="text-sm text-gray-400 mb-3">Check your body mass index easily.</p>
                <a href="bmi-calculator.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-center py-2 rounded-lg font-bold transition">Open Tool</a>
            </div>

            <div class="hub-card p-4 rounded-xl">
                <h3 class="font-bold text-lg">Password Generator</h3>
                <p class="text-sm text-gray-400 mb-3">Create secure and random passwords.</p>
                <a href="password-generator.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-center py-2 rounded-lg font-bold transition">Open Tool</a>
            </div>

            <div class="hub-card p-4 rounded-xl">
                <h3 class="font-bold text-lg">QR Code Generator</h3>
                <p class="text-sm text-gray-400 mb-3">Generate QR codes for URLs or text.</p>
                <a href="qr-code-generator.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-center py-2 rounded-lg font-bold transition">Open Tool</a>
            </div>
        </div>
    </div>
</body>
</html>
