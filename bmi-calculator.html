<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator | Multi Feature Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #090d16; color: #f9fafb; font-family: sans-serif; }
        .hub-card { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto hub-card rounded-2xl p-6 mt-10">
        <a href="index.html" class="text-blue-500 mb-4 block underline">Back to Home</a>
        <h1 class="text-2xl font-bold mb-6 text-blue-400">BMI Calculator</h1>
        
        <form id="bmiForm" class="space-y-4" onsubmit="event.preventDefault(); calculateBMI();">
            <div>
                <label for="weight" class="block text-sm font-medium mb-1">Weight (in kg)</label>
                <input type="number" id="weight" step="0.1" aria-required="true" required placeholder="e.g. 70" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="height" class="block text-sm font-medium mb-1">Height (in cm)</label>
                <input type="number" id="height" step="1" aria-required="true" required placeholder="e.g. 175" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition">Calculate BMI</button>
        </form>
        
        <div id="result" role="region" aria-live="polite" class="mt-6 p-4 rounded-xl bg-slate-900 border border-slate-800 hidden">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wide">Your Result:</h2>
            <p id="resultText" class="text-xl font-bold text-blue-400 mt-2"></p>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value) / 100;
            
            if (!weight || !height || height <= 0) return alert("Please enter valid positive values.");
            
            const bmi = (weight / (height * height)).toFixed(1);
            let category = "";
            
            if (bmi < 18.5) category = "Underweight";
            else if (bmi < 24.9) category = "Normal weight";
            else if (bmi < 29.9) category = "Overweight";
            else category = "Obese";
            
            const resultText = document.getElementById('resultText');
            resultText.innerText = `Your BMI is ${bmi} (${category}).`;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
