<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-blue: #2563eb;
            --text-light: #d1d5db;
            --text-white: #ffffff;
            --background-dark: #0f172a;
            --card-background: #1e293b;
            --border-color: #334155;
            --input-bg: #0f172a;
            --success-green: #22c55e;
            --error-red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-dark);
            color: var(--text-light);
        }

        .container {
            background-color: var(--card-background);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border-color);
        }

        h1 {
            color: var(--text-white);
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background-color: var(--input-bg);
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: 3px solid rgba(59, 130, 246, 0.5);
            border-color: var(--primary-blue);
        }

        /* Swap Button Styling */
        .swap-container {
            display: flex;
            justify-content: center;
            margin: -10px 0 10px 0;
        }

        .swap-btn {
            background: var(--border-color);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .swap-btn:hover { background: var(--primary-blue); }

        button#convertBtn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button#convertBtn:hover { background-color: var(--dark-blue); }

        /* Accessible Result Area */
        .result-area {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: #0f172a;
            border-radius: 12px;
            text-align: center;
            min-height: 80px;
        }

        #conversionResult {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-white);
            margin: 0;
        }

        .error-msg { color: var(--error-red); font-weight: bold; }
        
        .loading {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Visually hidden but readable by screen readers */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body>

    <main class="container">
        <h1>Currency Converter</h1>

        <div class="input-group">
            <label for="amount">Amount to Convert</label>
            <input type="number" id="amount" placeholder="e.g. 100" aria-describedby="amount-hint">
            <span id="amount-hint" class="sr-only">Enter the numerical value you want to exchange.</span>
        </div>

        <div class="input-group">
            <label for="fromCurrency">From</label>
            <select id="fromCurrency"></select>
        </div>

        <div class="swap-container">
            <button class="swap-btn" id="swapBtn" aria-label="Swap Currencies" title="Swap Currencies">⇄</button>
        </div>

        <div class="input-group">
            <label for="toCurrency">To</label>
            <select id="toCurrency"></select>
        </div>

        <button id="convertBtn">Convert Now</button>

        <div class="result-area" aria-live="polite" id="status-region">
            <p id="conversionResult">Enter amount and click convert</p>
            <p id="conversionDetail" style="font-size: 0.9rem; color: #94a3b8;"></p>
        </div>
    </main>

    <script>
        const currencies = {
            "USD": "US Dollar", "EUR": "Euro", "GBP": "British Pound", "INR": "Indian Rupee",
            "JPY": "Japanese Yen", "AUD": "Australian Dollar", "CAD": "Canadian Dollar",
            "CHF": "Swiss Franc", "CNY": "Chinese Yuan", "AED": "UAE Dirham", "SGD": "Singapore Dollar",
            "NZD": "New Zealand Dollar", "MXN": "Mexican Peso", "ZAR": "South African Rand"
        };

        // Static rates for demo (Replace with API call in production)
        const rates = {
            "USD": 1, "EUR": 0.92, "GBP": 0.79, "INR": 83.15, "JPY": 150.12, "AUD": 1.53,
            "CAD": 1.35, "CHF": 0.88, "CNY": 7.19, "AED": 3.67, "SGD": 1.34, "NZD": 1.63,
            "MXN": 17.05, "ZAR": 19.10
        };

        const fromSelect = document.getElementById('fromCurrency');
        const toSelect = document.getElementById('toCurrency');
        const amountInput = document.getElementById('amount');
        const resultText = document.getElementById('conversionResult');
        const detailText = document.getElementById('conversionDetail');

        // Populate Dropdowns
        function init() {
            Object.entries(currencies).forEach(([code, name]) => {
                const opt1 = new Option(`${code} - ${name}`, code);
                const opt2 = new Option(`${code} - ${name}`, code);
                fromSelect.add(opt1);
                toSelect.add(opt2);
            });
            fromSelect.value = "USD";
            toSelect.value = "INR";
        }

        function convert() {
            const amount = parseFloat(amountInput.value);
            const from = fromSelect.value;
            const to = toSelect.value;

            if (isNaN(amount) || amount <= 0) {
                resultText.innerHTML = `<span class="error-msg">Please enter a valid amount</span>`;
                return;
            }

            resultText.innerHTML = '<div class="loading"></div>';
            
            // Simulating a small delay for realism/API feel
            setTimeout(() => {
                // Calculation: (Amount / Rate of From) * Rate of To
                const result = (amount / rates[from]) * rates[to];
                
                resultText.innerText = `${result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${to}`;
                detailText.innerText = `1 ${from} = ${(rates[to]/rates[from]).toFixed(4)} ${to}`;
            }, 500);
        }

        // Swap functionality
        document.getElementById('swapBtn').addEventListener('click', () => {
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            if(amountInput.value) convert();
        });

        document.getElementById('convertBtn').addEventListener('click', convert);
        
        init();
    </script>
</body>
</html>
