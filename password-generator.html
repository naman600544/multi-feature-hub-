<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #090d16; color: #f9fafb; font-family: sans-serif; }
        .hub-card { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto hub-card rounded-2xl p-6 mt-10">
        <a href="index.html" class="text-blue-500 mb-4 block underline">Back to Home</a>
        <h1 class="text-2xl font-bold mb-6 text-blue-400">Password Generator</h1>
        
        <div class="space-y-4">
            <div>
                <label for="length" class="block text-sm font-medium mb-1">Password Length: <span id="lenVal" class="text-blue-400 font-bold">16</span></label>
                <input type="range" id="length" min="6" max="32" value="16" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" oninput="document.getElementById('lenVal').innerText=this.value">
            </div>

            <div class="space-y-3">
                <div class="flex items-center">
                    <input type="checkbox" id="uppercase" checked class="w-5 h-5 accent-blue-600 mr-3">
                    <label for="uppercase" class="cursor-pointer">Include Uppercase</label>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="numbers" checked class="w-5 h-5 accent-blue-600 mr-3">
                    <label for="numbers" class="cursor-pointer">Include Numbers</label>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="symbols" checked class="w-5 h-5 accent-blue-600 mr-3">
                    <label for="symbols" class="cursor-pointer">Include Symbols</label>
                </div>
            </div>
            
            <button onclick="generatePassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition">Generate Password</button>
        </div>
        
        <div id="result" role="region" aria-live="polite" class="mt-6 p-4 rounded-xl bg-slate-900 border border-slate-800 hidden">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Result:</h2>
            <div class="flex items-center justify-between mt-2">
                <p id="resultText" class="text-lg font-mono text-emerald-400 break-all"></p>
                <button onclick="copyPassword()" class="ml-4 bg-slate-700 px-3 py-1 rounded-lg hover:bg-slate-600 text-sm">Copy</button>
            </div>
        </div>
    </div>

    <script>
        function generatePassword() {
            const length = document.getElementById('length').value;
            const hasUpper = document.getElementById('uppercase').checked;
            const hasNumber = document.getElementById('numbers').checked;
            const hasSymbol = document.getElementById('symbols').checked;
            
            let charset = "abcdefghijklmnopqrstuvwxyz";
            if (hasUpper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if (hasNumber) charset += "0123456789";
            if (hasSymbol) charset += "!@#$%^&*()_+~`|}{[]:;?><,./-=";
            
            let password = "";
            for (let i = 0; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            
            document.getElementById('resultText').innerText = password;
            document.getElementById('result').classList.remove('hidden');
        }

        function copyPassword() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
