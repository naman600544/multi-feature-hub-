<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | Multi Feature Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #090d16; color: #f9fafb; font-family: sans-serif; }
        .hub-card { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-md mx-auto hub-card rounded-2xl p-6 mt-10">
        <a href="index.html" class="text-blue-500 mb-4 block"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        <h3 class="text-xl font-bold mb-4 text-blue-400">Password Generator</h3>
        
        <div class="space-y-4">
            <div>
                <label class="text-sm text-gray-400">Password Length: <span id="lenVal" class="text-white font-bold">16</span></label>
                <input type="range" id="length" min="8" max="32" value="16" class="w-full accent-blue-500" oninput="document.getElementById('lenVal').innerText=this.value">
            </div>
            <button onclick="generatePassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition">Generate Password</button>
        </div>
        
        <div id="passResult" class="text-center font-bold p-4 rounded-xl bg-slate-900 mt-4 border border-slate-800 hidden space-y-3">
            <p id="resultText" class="text-lg text-emerald-400 font-mono"></p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyResult()" class="bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm transition"><i class="fa-solid fa-copy"></i> Copy</button>
                <button onclick="shareResult()" class="bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm transition"><i class="fa-solid fa-share-nodes"></i> Share</button>
            </div>
        </div>
    </div>

    <script>
        function generatePassword() {
            const length = document.getElementById('length').value;
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let retVal = "";
            for (let i = 0, n = charset.length; i < length; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * n));
            }
            const resultText = document.getElementById('resultText');
            resultText.innerText = retVal;
            document.getElementById('passResult').classList.remove('hidden');
        }

        function copyResult() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Password copied to clipboard!");
        }

        function shareResult() {
            const text = document.getElementById('resultText').innerText;
            if (navigator.share) {
                navigator.share({ title: 'Generated Password', text: text });
            } else {
                alert("Sharing is not supported in this browser.");
            }
        }
    </script>
</body>
</html>
